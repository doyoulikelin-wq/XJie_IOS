# XJie canonical main 的远端质量门禁。
#
# workflow 不使用 paths 过滤：代码、文档、门禁或发布脚本的任何 PR/push 都必须产生同名
# required check，避免“改了门禁文件所以检查本身缺席”。最终 quality-gate 只汇总三个独立
# job 的结论，不重新解释测试结果，也不允许某个 job 失败后由后续步骤覆盖为成功。
name: Xjie Quality Gate

# main 是唯一交付分支；锁定的 XAGE 不再触发或接收交付。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# 默认值为空/0 时只运行轻量检查；仓库变量显式设为 1 可恢复下面保留的完整门禁步骤。
env:
  XJIE_STRICT_GATES: ${{ vars.XJIE_STRICT_GATES }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Regression contracts and change gate
    # 默认只做语法、JSON 与差异检查；XJIE_STRICT_GATES=1 时恢复 tools 精确测试和 guard。
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve comparison base
        # PR 使用 base SHA，push 使用 event.before；没有有效 before 时回退 HEAD^，确保 guard
        # 始终面对明确且不可变的比较范围。
        id: comparison
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE"
          else
            base="$PUSH_BASE"
          fi
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base=$(git rev-parse HEAD^)
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Validate guard implementation
        # 先测试“门禁本身”，再让它审查产品候选，避免同一修改同时削弱规则和规则测试。
        if: env.XJIE_STRICT_GATES == '1'
        run: |
          set -euo pipefail
          /usr/bin/python3 -I tools/python_test_gate.py tools
          git diff --check '${{ steps.comparison.outputs.base }}' "$GITHUB_SHA"

      - name: Enforce behavior-change contract
        if: env.XJIE_STRICT_GATES == '1'
        run: |
          set -euo pipefail
          /usr/bin/python3 -I tools/regression_guard.py check \
            --base '${{ steps.comparison.outputs.base }}' \
            --head "$GITHUB_SHA"

      - name: Run lightweight policy checks
        env:
          PYTHONPYCACHEPREFIX: /tmp/xjie-light-pycache
        run: |
          set -euo pipefail
          git diff --check '${{ steps.comparison.outputs.base }}' "$GITHUB_SHA"
          /usr/bin/python3 -m json.tool quality/change_impact.json >/dev/null
          /usr/bin/python3 -m json.tool quality/regression_contracts.json >/dev/null
          /usr/bin/python3 -m py_compile \
            tools/run_regression_gate.py \
            tools/regression_guard.py \
            tools/validate_xcresult.py \
            tools/verify_release_bundle.py
          /bin/sh -n .githooks/pre-commit .githooks/pre-push
          /bin/zsh -f -n scripts/release_testflight.sh

  backend:
    name: Backend full regression
    # 默认只编译 Python 源码；XJIE_STRICT_GATES=1 时恢复生产镜像、完整清单与 PG 自测。
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Compile backend Python sources
        env:
          PYTHONPYCACHEPREFIX: /tmp/xjie-light-pycache
        run: |
          set -euo pipefail
          python3 -m compileall -q backend/app tools

      - name: Build the production backend image
        if: env.XJIE_STRICT_GATES == '1'
        env:
          BACKEND_IMAGE: xjie-backend-ci:${{ github.sha }}
        run: |
          set -euo pipefail
          docker build \
            --pull \
            --platform linux/amd64 \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --tag "$BACKEND_IMAGE" \
            backend
          docker run --rm \
            --platform linux/amd64 \
            --network none \
            --entrypoint python \
            "$BACKEND_IMAGE" \
            -I -c 'import importlib.metadata,platform,sys; assert sys.version_info[:3] == (3,11,15); assert platform.machine() == "x86_64"; assert importlib.metadata.version("pip") == "26.1.2"; assert importlib.metadata.version("setuptools") == "83.0.0"; assert importlib.metadata.version("wheel") == "0.47.0"; assert importlib.metadata.version("metabodash-backend") == "0.1.0"'
          docker run --rm \
            --platform linux/amd64 \
            --network none \
            --entrypoint python \
            "$BACKEND_IMAGE" \
            -I -m pip check

      - name: Run production bundle installer Linux runtime self-test
        if: env.XJIE_STRICT_GATES == '1'
        env:
          BACKEND_IMAGE: xjie-backend-ci:${{ github.sha }}
        run: |
          set -euo pipefail
          docker run --rm \
            --platform linux/amd64 \
            --network none \
            --mount "type=bind,source=$PWD,target=/workspace,readonly" \
            --entrypoint python \
            "$BACKEND_IMAGE" \
            -I /workspace/tools/production_bundle_installer_linux_selftest.py

      - name: Run production launcher Linux runtime self-test
        if: env.XJIE_STRICT_GATES == '1'
        env:
          BACKEND_IMAGE: xjie-backend-ci:${{ github.sha }}
        run: |
          set -euo pipefail
          sudo /usr/bin/python3 -I tools/production_launcher_linux_selftest.py \
            --docker-image "$BACKEND_IMAGE"

      - name: Run real PostgreSQL production catalog integration gate
        if: env.XJIE_STRICT_GATES == '1'
        env:
          BACKEND_IMAGE: xjie-backend-ci:${{ github.sha }}
        run: |
          set -euo pipefail
          /usr/bin/python3 -I tools/production_catalog_postgres_selftest.py \
            --backend-image "$BACKEND_IMAGE"

      - name: Run real PostgreSQL expand-migration integration gate
        if: env.XJIE_STRICT_GATES == '1'
        env:
          BACKEND_IMAGE: xjie-backend-ci:${{ github.sha }}
        run: |
          set -euo pipefail
          /usr/bin/python3 -I tools/production_expand_migration_postgres_selftest.py \
            --backend-image "$BACKEND_IMAGE"

      - name: Run backend tests in the production image
        if: env.XJIE_STRICT_GATES == '1'
        env:
          BACKEND_IMAGE: xjie-backend-ci:${{ github.sha }}
        run: |
          set -euo pipefail
          result_dir=/tmp/xjie-backend-ci-results
          rm -rf "$result_dir"
          install -d -m 0777 "$result_dir"
          docker run --rm \
            --platform linux/amd64 \
            --network none \
            --mount "type=bind,source=$PWD/backend/deploy/production_deploy_guard.py,target=/workspace/backend/deploy/production_deploy_guard.py,readonly" \
            --mount "type=bind,source=$PWD/backend/deploy/production_container.json,target=/workspace/backend/deploy/production_container.json,readonly" \
            --mount "type=bind,source=$PWD/tools,target=/workspace/tools,readonly" \
            --mount "type=bind,source=$PWD/quality,target=/workspace/quality,readonly" \
            --mount "type=bind,source=$result_dir,target=/results" \
            --entrypoint /bin/bash \
            "$BACKEND_IMAGE" \
            -ceu '
              test ! -e /app/deploy
              mkdir -p /workspace/backend
              cp -a /app/. /workspace/backend/
              cd /workspace
              python -I tools/python_test_gate.py backend \
                --profile full \
                --junitxml /results/backend-junit.xml \
                -- backend/tests -q
            '
          /usr/bin/python3 -I - <<'PY'
          import importlib.util
          import sys
          from pathlib import Path

          root = Path.cwd()
          source = root / "tools" / "python_test_gate.py"
          spec = importlib.util.spec_from_file_location("xjie_python_test_gate", source)
          if spec is None or spec.loader is None:
              raise SystemExit("cannot load the tracked Python test gate")
          gate = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = gate
          spec.loader.exec_module(gate)
          summary = gate.validate_backend_junit(
              Path("/tmp/xjie-backend-ci-results/backend-junit.xml"),
              profile="full",
              selected_files=set((root / "backend" / "tests").rglob("test_*.py")),
          )
          inventory = gate.load_expected_tests()["backend_full"]
          allowed_skips = gate.ALLOWED_BACKEND_FULL_SKIPS
          expected = {
              "executed": len(inventory),
              "passed": len(inventory) - len(allowed_skips),
              "skipped": len(allowed_skips),
          }
          if summary != expected:
              raise SystemExit(f"backend exact result changed: {summary!r}")
          print(
              "PYTHON TEST GATE: backend passed; "
              f"executed={summary['executed']} "
              f"passed={summary['passed']} skipped={summary['skipped']}"
          )
          PY

      - name: Upload backend test result
        if: env.XJIE_STRICT_GATES == '1' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-test-result
          path: /tmp/xjie-backend-ci-results/backend-junit.xml
          if-no-files-found: warn

  ios:
    name: iOS unit, UI and Release regression
    # 默认只做 generic Simulator Debug 编译；strict 时恢复 Unit/UI/小屏与 device Archive。
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: '26.3'

      - name: Compile iOS app for generic Simulator
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild build \
            -quiet \
            -project Xjie/Xjie.xcodeproj \
            -scheme Xjie \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath /tmp/Xjie-CI-Light-Derived \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Select an available iPhone Simulator
        if: env.XJIE_STRICT_GATES == '1'
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          device_id=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          payload = json.load(sys.stdin)
          devices = [d for group in payload["devices"].values() for d in group if d.get("isAvailable") and d.get("name", "").startswith("iPhone")]
          preferred = next((d for d in devices if d["name"] in {"iPhone 17 Pro", "iPhone 16 Pro", "iPhone 16"}), None)
          selected = preferred or (devices[0] if devices else None)
          if selected is None:
              raise SystemExit("No available iPhone Simulator")
          print(selected["udid"])
          ')
          echo "device_id=$device_id" >> "$GITHUB_OUTPUT"

          small_device_id=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          payload = json.load(sys.stdin)
          devices = [d for group in payload["devices"].values() for d in group if d.get("isAvailable")]
          expected = "com.apple.CoreSimulator.SimDeviceType.iPhone-SE-3rd-generation"
          selected = next((d for d in devices if d.get("deviceTypeIdentifier") == expected), None)
          print(selected["udid"] if selected else "")
          ')
          if [[ -z "$small_device_id" ]]; then
            small_device_type=$(xcrun simctl list devicetypes -j | python3 -c '
            import json, sys
            payload = json.load(sys.stdin)
            selected = next((d for d in payload["devicetypes"] if d.get("name") == "iPhone SE (3rd generation)"), None)
            if selected is None:
                raise SystemExit("iPhone SE (3rd generation) device type unavailable")
            print(selected["identifier"])
            ')
            latest_ios_runtime=$(xcrun simctl list runtimes available -j | python3 -c '
            import json, re, sys
            payload = json.load(sys.stdin)
            runtimes = [r for r in payload["runtimes"] if r.get("isAvailable") and r.get("name", "").startswith("iOS")]
            if not runtimes:
                raise SystemExit("No available iOS runtime for small simulator")
            selected = max(runtimes, key=lambda r: tuple(int(x) for x in re.findall(r"\d+", r.get("version", "0"))))
            print(selected["identifier"])
            ')
            small_device_id=$(xcrun simctl create "XAGE CI Small" "$small_device_type" "$latest_ios_runtime")
          fi
          xcrun simctl list devices available -j | SMALL_DEVICE_ID="$small_device_id" python3 -c '
          import json, os, sys
          payload = json.load(sys.stdin)
          expected_id = os.environ["SMALL_DEVICE_ID"]
          expected_type = "com.apple.CoreSimulator.SimDeviceType.iPhone-SE-3rd-generation"
          device = next((d for group in payload["devices"].values() for d in group if d.get("udid") == expected_id), None)
          if device is None or device.get("deviceTypeIdentifier") != expected_type:
              raise SystemExit("Small simulator is not an iPhone SE (3rd generation)")
          '
          echo "small_device_id=$small_device_id" >> "$GITHUB_OUTPUT"
          xcode_identity=$(xcodebuild -version)
          [[ "$xcode_identity" == $'Xcode 26.3\nBuild version 17C529' ]]

      - name: Run complete iOS unit and UI suite
        # 一次执行 Unit + 完整 UI，并要求生成的 xcresult 精确等于 ios_all 清单。
        if: env.XJIE_STRICT_GATES == '1'
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          rm -rf /tmp/Xjie-CI.xcresult /tmp/Xjie-CI-Derived
          xcodebuild test \
            -project Xjie/Xjie.xcodeproj \
            -scheme Xjie \
            -configuration Debug \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}' \
            -derivedDataPath /tmp/Xjie-CI-Derived \
            -resultBundlePath /tmp/Xjie-CI.xcresult \
            CODE_SIGN_IDENTITY='' CODE_SIGNING_REQUIRED=NO \
            | tee /tmp/xjie-ios-test.log
          python3 -I tools/validate_xcresult.py \
            --path /tmp/Xjie-CI.xcresult \
            --expected-profile ios_all

      - name: Build Release configuration
        # PR 阶段只创建无签名 device archive，证明 Release/iphoneos/arm64 包边界；它不是
        # TestFlight 签名、上传或正式发布证据。
        if: env.XJIE_STRICT_GATES == '1'
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          /bin/zsh -f -n scripts/release_testflight.sh
          rm -rf /tmp/Xjie-CI-Release.xcarchive /tmp/Xjie-CI-Release-Derived
          xcodebuild archive \
            -project Xjie/Xjie.xcodeproj \
            -scheme Xjie \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath /tmp/Xjie-CI-Release.xcarchive \
            -derivedDataPath /tmp/Xjie-CI-Release-Derived \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            | tee /tmp/xjie-ios-release.log
          release_app=/tmp/Xjie-CI-Release.xcarchive/Products/Applications/Xjie.app
          [[ -d "$release_app" ]]
          python3 -I tools/verify_release_bundle.py "$release_app"

      - name: Run small-screen interaction regression
        # 必须在识别为 iPhone SE（第 3 代）的 Simulator 上执行固定双用例，防止普通设备
        # 结果冒充小屏安全区、命中区和键盘布局证据。
        if: env.XJIE_STRICT_GATES == '1'
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          rm -rf /tmp/Xjie-CI-Small.xcresult /tmp/Xjie-CI-Small-Derived
          xcodebuild test \
            -project Xjie/Xjie.xcodeproj \
            -scheme Xjie \
            -configuration Debug \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.small_device_id }}' \
            -derivedDataPath /tmp/Xjie-CI-Small-Derived \
            -resultBundlePath /tmp/Xjie-CI-Small.xcresult \
            -only-testing:XjieUITests/XAgeHighIntensityContextUITests/testNavigationTouchTargetsAndFormDismissalConventions \
            -only-testing:XjieUITests/XAgeHighIntensityContextUITests/testMetricManagerPageAndChatKeyboardLifecycle \
            CODE_SIGN_IDENTITY='' CODE_SIGNING_REQUIRED=NO \
            | tee /tmp/xjie-ios-small.log
          python3 -I tools/validate_xcresult.py \
            --path /tmp/Xjie-CI-Small.xcresult \
            --expected-profile ios_ui_small \
            --required-device-model 'iPhone SE (3rd generation)'

      - name: Upload iOS results
        if: env.XJIE_STRICT_GATES == '1' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ios-test-results
          path: |
            /tmp/Xjie-CI.xcresult
            /tmp/Xjie-CI-Small.xcresult
            /tmp/xjie-ios-test.log
            /tmp/xjie-ios-release.log
            /tmp/xjie-ios-small.log
          if-no-files-found: warn

  quality-gate:
    name: quality-gate
    # 分支保护要求的唯一汇总 check。always() 让上游失败/取消时本 job 仍执行，再用显式
    # success 比较 fail-closed；policy、backend、ios 三者缺一不可。
    if: always()
    needs: [policy, backend, ios]
    runs-on: ubuntu-latest
    steps:
      - name: Require every gate
        env:
          POLICY: ${{ needs.policy.result }}
          BACKEND: ${{ needs.backend.result }}
          IOS: ${{ needs.ios.result }}
        run: |
          set -euo pipefail
          [[ "$POLICY" == "success" ]]
          [[ "$BACKEND" == "success" ]]
          [[ "$IOS" == "success" ]]
          echo "All required regression gates passed."
