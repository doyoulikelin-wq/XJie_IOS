# Regression prevention gate for iOS XAGE and its production backend.
name: Xjie Quality Gate

on:
  push:
    branches: [main, XAGE]
    paths:
      - 'Xjie/**'
      - 'backend/**'
      - 'quality/**'
      - 'tools/regression_guard.py'
      - 'tools/run_regression_gate.py'
      - 'tools/tests/**'
      - 'scripts/**'
      - '.githooks/**'
      - '.github/workflows/ci.yml'
      - 'AGENTS.md'
      - 'docs/quality/**'
  pull_request:
    branches: [main, XAGE]
    paths:
      - 'Xjie/**'
      - 'backend/**'
      - 'quality/**'
      - 'tools/regression_guard.py'
      - 'tools/run_regression_gate.py'
      - 'tools/tests/**'
      - 'scripts/**'
      - '.githooks/**'
      - '.github/workflows/ci.yml'
      - 'AGENTS.md'
      - 'docs/quality/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Regression contracts and change gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve comparison base
        id: comparison
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE"
          else
            base="$PUSH_BASE"
          fi
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base=$(git rev-parse HEAD^)
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Validate guard implementation
        run: |
          set -euo pipefail
          python3 -m unittest discover -s tools/tests -p 'test_*.py'
          python3 tools/regression_guard.py validate
          zsh -n scripts/release_testflight.sh

      - name: Enforce behavior-change contract
        run: |
          set -euo pipefail
          python3 tools/regression_guard.py check \
            --base '${{ steps.comparison.outputs.base }}' \
            --head "$GITHUB_SHA"

  backend:
    name: Backend full regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e backend

      - name: Run backend tests
        run: |
          set -euo pipefail
          python -m pytest backend/tests -q --junitxml=/tmp/backend-junit.xml

      - name: Upload backend test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-result
          path: /tmp/backend-junit.xml
          if-no-files-found: warn

  ios:
    name: iOS unit, UI and Release regression
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Select an available iPhone Simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          device_id=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          payload = json.load(sys.stdin)
          devices = [d for group in payload["devices"].values() for d in group if d.get("isAvailable") and d.get("name", "").startswith("iPhone")]
          preferred = next((d for d in devices if d["name"] in {"iPhone 17 Pro", "iPhone 16 Pro", "iPhone 16"}), None)
          selected = preferred or (devices[0] if devices else None)
          if selected is None:
              raise SystemExit("No available iPhone Simulator")
          print(selected["udid"])
          ')
          echo "device_id=$device_id" >> "$GITHUB_OUTPUT"
          xcodebuild -version

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xage-derived-${{ hashFiles('Xjie/Xjie.xcodeproj/project.pbxproj') }}
          restore-keys: ${{ runner.os }}-xage-derived-

      - name: Run complete iOS unit and UI suite
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          rm -rf /tmp/Xjie-CI.xcresult
          xcodebuild test \
            -project Xjie/Xjie.xcodeproj \
            -scheme Xjie \
            -configuration Debug \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}' \
            -resultBundlePath /tmp/Xjie-CI.xcresult \
            CODE_SIGN_IDENTITY='' CODE_SIGNING_REQUIRED=NO \
            | tee /tmp/xjie-ios-test.log

      - name: Build Release configuration
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          xcodebuild build \
            -project Xjie/Xjie.xcodeproj \
            -scheme Xjie \
            -configuration Release \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}' \
            CODE_SIGN_IDENTITY='' CODE_SIGNING_REQUIRED=NO \
            | tee /tmp/xjie-ios-release.log

      - name: Upload iOS results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: |
            /tmp/Xjie-CI.xcresult
            /tmp/xjie-ios-test.log
            /tmp/xjie-ios-release.log
          if-no-files-found: warn

  quality-gate:
    name: quality-gate
    if: always()
    needs: [policy, backend, ios]
    runs-on: ubuntu-latest
    steps:
      - name: Require every gate
        env:
          POLICY: ${{ needs.policy.result }}
          BACKEND: ${{ needs.backend.result }}
          IOS: ${{ needs.ios.result }}
        run: |
          set -euo pipefail
          [[ "$POLICY" == "success" ]]
          [[ "$BACKEND" == "success" ]]
          [[ "$IOS" == "success" ]]
          echo "All required regression gates passed."
