# Regression prevention gate for iOS XAGE and its production backend.
name: Xjie Quality Gate

on:
  push:
    branches: [main, XAGE]
  pull_request:
    branches: [main, XAGE]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Regression contracts and change gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve comparison base
        id: comparison
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE"
          else
            base="$PUSH_BASE"
          fi
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base=$(git rev-parse HEAD^)
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Validate guard implementation
        run: |
          set -euo pipefail
          python3 -I tools/python_test_gate.py tools
          python3 -I tools/regression_guard.py validate
          git diff --check '${{ steps.comparison.outputs.base }}' "$GITHUB_SHA"

      - name: Enforce behavior-change contract
        run: |
          set -euo pipefail
          python3 -I tools/regression_guard.py check \
            --base '${{ steps.comparison.outputs.base }}' \
            --head "$GITHUB_SHA"

  backend:
    name: Backend full regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e backend

      - name: Run backend tests
        run: |
          set -euo pipefail
          python -I tools/python_test_gate.py backend \
            --profile full \
            --junitxml /tmp/backend-junit.xml \
            -- backend/tests -q

      - name: Upload backend test result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-test-result
          path: /tmp/backend-junit.xml
          if-no-files-found: warn

  ios:
    name: iOS unit, UI and Release regression
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: '26.3'

      - name: Select an available iPhone Simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          device_id=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          payload = json.load(sys.stdin)
          devices = [d for group in payload["devices"].values() for d in group if d.get("isAvailable") and d.get("name", "").startswith("iPhone")]
          preferred = next((d for d in devices if d["name"] in {"iPhone 17 Pro", "iPhone 16 Pro", "iPhone 16"}), None)
          selected = preferred or (devices[0] if devices else None)
          if selected is None:
              raise SystemExit("No available iPhone Simulator")
          print(selected["udid"])
          ')
          echo "device_id=$device_id" >> "$GITHUB_OUTPUT"

          small_device_id=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          payload = json.load(sys.stdin)
          devices = [d for group in payload["devices"].values() for d in group if d.get("isAvailable")]
          expected = "com.apple.CoreSimulator.SimDeviceType.iPhone-SE-3rd-generation"
          selected = next((d for d in devices if d.get("deviceTypeIdentifier") == expected), None)
          print(selected["udid"] if selected else "")
          ')
          if [[ -z "$small_device_id" ]]; then
            small_device_type=$(xcrun simctl list devicetypes -j | python3 -c '
            import json, sys
            payload = json.load(sys.stdin)
            selected = next((d for d in payload["devicetypes"] if d.get("name") == "iPhone SE (3rd generation)"), None)
            if selected is None:
                raise SystemExit("iPhone SE (3rd generation) device type unavailable")
            print(selected["identifier"])
            ')
            latest_ios_runtime=$(xcrun simctl list runtimes available -j | python3 -c '
            import json, re, sys
            payload = json.load(sys.stdin)
            runtimes = [r for r in payload["runtimes"] if r.get("isAvailable") and r.get("name", "").startswith("iOS")]
            if not runtimes:
                raise SystemExit("No available iOS runtime for small simulator")
            selected = max(runtimes, key=lambda r: tuple(int(x) for x in re.findall(r"\d+", r.get("version", "0"))))
            print(selected["identifier"])
            ')
            small_device_id=$(xcrun simctl create "XAGE CI Small" "$small_device_type" "$latest_ios_runtime")
          fi
          xcrun simctl list devices available -j | SMALL_DEVICE_ID="$small_device_id" python3 -c '
          import json, os, sys
          payload = json.load(sys.stdin)
          expected_id = os.environ["SMALL_DEVICE_ID"]
          expected_type = "com.apple.CoreSimulator.SimDeviceType.iPhone-SE-3rd-generation"
          device = next((d for group in payload["devices"].values() for d in group if d.get("udid") == expected_id), None)
          if device is None or device.get("deviceTypeIdentifier") != expected_type:
              raise SystemExit("Small simulator is not an iPhone SE (3rd generation)")
          '
          echo "small_device_id=$small_device_id" >> "$GITHUB_OUTPUT"
          xcode_identity=$(xcodebuild -version)
          [[ "$xcode_identity" == $'Xcode 26.3\nBuild version 17C529' ]]

      - name: Run complete iOS unit and UI suite
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          rm -rf /tmp/Xjie-CI.xcresult /tmp/Xjie-CI-Derived
          xcodebuild test \
            -project Xjie/Xjie.xcodeproj \
            -scheme Xjie \
            -configuration Debug \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}' \
            -derivedDataPath /tmp/Xjie-CI-Derived \
            -resultBundlePath /tmp/Xjie-CI.xcresult \
            CODE_SIGN_IDENTITY='' CODE_SIGNING_REQUIRED=NO \
            | tee /tmp/xjie-ios-test.log
          python3 -I tools/validate_xcresult.py \
            --path /tmp/Xjie-CI.xcresult \
            --expected-profile ios_all

      - name: Build Release configuration
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          /bin/zsh -f -n scripts/release_testflight.sh
          rm -rf /tmp/Xjie-CI-Release.xcarchive /tmp/Xjie-CI-Release-Derived
          xcodebuild archive \
            -project Xjie/Xjie.xcodeproj \
            -scheme Xjie \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath /tmp/Xjie-CI-Release.xcarchive \
            -derivedDataPath /tmp/Xjie-CI-Release-Derived \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            | tee /tmp/xjie-ios-release.log
          release_app=/tmp/Xjie-CI-Release.xcarchive/Products/Applications/Xjie.app
          [[ -d "$release_app" ]]
          python3 -I tools/verify_release_bundle.py "$release_app"

      - name: Run small-screen interaction regression
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          rm -rf /tmp/Xjie-CI-Small.xcresult /tmp/Xjie-CI-Small-Derived
          xcodebuild test \
            -project Xjie/Xjie.xcodeproj \
            -scheme Xjie \
            -configuration Debug \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.small_device_id }}' \
            -derivedDataPath /tmp/Xjie-CI-Small-Derived \
            -resultBundlePath /tmp/Xjie-CI-Small.xcresult \
            -only-testing:XjieUITests/XAgeHighIntensityContextUITests/testNavigationTouchTargetsAndFormDismissalConventions \
            -only-testing:XjieUITests/XAgeHighIntensityContextUITests/testMetricManagerPageAndChatKeyboardLifecycle \
            CODE_SIGN_IDENTITY='' CODE_SIGNING_REQUIRED=NO \
            | tee /tmp/xjie-ios-small.log
          python3 -I tools/validate_xcresult.py \
            --path /tmp/Xjie-CI-Small.xcresult \
            --expected-profile ios_ui_small \
            --required-device-model 'iPhone SE (3rd generation)'

      - name: Upload iOS results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ios-test-results
          path: |
            /tmp/Xjie-CI.xcresult
            /tmp/Xjie-CI-Small.xcresult
            /tmp/xjie-ios-test.log
            /tmp/xjie-ios-release.log
            /tmp/xjie-ios-small.log
          if-no-files-found: warn

  quality-gate:
    name: quality-gate
    if: always()
    needs: [policy, backend, ios]
    runs-on: ubuntu-latest
    steps:
      - name: Require every gate
        env:
          POLICY: ${{ needs.policy.result }}
          BACKEND: ${{ needs.backend.result }}
          IOS: ${{ needs.ios.result }}
        run: |
          set -euo pipefail
          [[ "$POLICY" == "success" ]]
          [[ "$BACKEND" == "success" ]]
          [[ "$IOS" == "success" ]]
          echo "All required regression gates passed."
